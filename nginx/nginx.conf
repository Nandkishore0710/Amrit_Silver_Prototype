events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10M;
  server_tokens off;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

  # Upstream servers
  upstream silverkaari_backend {
    server silverkaari-backend:5000;
    keepalive 32;
  }

  upstream silverine_backend {
    server silverine-backend:5001;
    keepalive 32;
  }

  # ──────────────────────────────────────────────
  # Silverkaari
  # ──────────────────────────────────────────────
  server {
    listen 80;
    server_name silverkaari.com www.silverkaari.com localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # API - Silverkaari backend
    location /api/ {
      limit_req zone=api burst=10 nodelay;

      proxy_pass http://silverkaari_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 10s;
      proxy_read_timeout 60s;
      proxy_send_timeout 30s;
    }

    # Auth endpoints — stricter rate limit
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;

      proxy_pass http://silverkaari_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload endpoints
    location /api/upload {
      limit_req zone=upload burst=3 nodelay;
      client_max_body_size 10M;

      proxy_pass http://silverkaari_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 120s;
    }

    # Stripe webhook — raw body, no buffering
    location /api/payments/webhook {
      proxy_pass http://silverkaari_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_request_buffering off;
    }

    # Socket.IO
    location /socket.io/ {
      proxy_pass http://silverkaari_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400;
    }

    # Static frontend — React/Vite build
    location / {
      root /usr/share/nginx/html/silverkaari;
      index index.html;
      try_files $uri $uri/ /index.html;

      # Cache static assets
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
      }

      # No cache for HTML
      location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
      }
    }
  }

  # ──────────────────────────────────────────────
  # SilverIne (port 8080 or separate domain)
  # ──────────────────────────────────────────────
  server {
    listen 80;
    server_name silverine.com www.silverine.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/ {
      limit_req zone=api burst=10 nodelay;

      proxy_pass http://silverine_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://silverine_backend;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass http://silverine_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400;
    }

    location / {
      root /usr/share/nginx/html/silverine;
      index index.html;
      try_files $uri $uri/ /index.html;

      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }

  # Redirect www to non-www
  server {
    listen 80;
    server_name www.silverkaari.com;
    return 301 http://silverkaari.com$request_uri;
  }
}
